disableHttpsTlsCheckDescription=Nếu tổ chức của cậu đang giải mã lưu lượng HTTPS trong tường lửa bằng cách chặn SSL, thì bất kỳ kiểm tra cập nhật hay kiểm tra giấy phép nào cũng sẽ thất bại do chứng chỉ không khớp nhau. Cậu có thể khắc phục vấn đề này bằng cách bật tùy chọn này và tắt tính năng xác thực chứng chỉ TLS.
