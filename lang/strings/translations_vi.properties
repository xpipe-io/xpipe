workspaceLock=Mật khẩu chính
enableGitStorage=Bật tính năng đồng bộ hóa
sharing=Chia sẻ
gitSync=Đồng bộ hóa Git
enableGitStorageDescription=Khi bật tính năng này, XPipe sẽ khởi tạo một kho lưu trữ git cho kho dữ liệu cục bộ và ghi lại mọi thay đổi vào đó. Lưu ý là điều này yêu cầu phải cài đặt git và có thể làm chậm các thao tác tải và lưu.\n\nBất kỳ danh mục nào cần đồng bộ đều phải được đánh dấu rõ ràng là đã đồng bộ.
storageGitRemote=URL đồng bộ hóa từ xa
storageGitRemoteDescription=Khi được bật, XPipe sẽ tự động kéo (pull) mọi thay đổi khi tải và đẩy (push) mọi thay đổi lên kho lưu trữ từ xa khi lưu.\n\nĐiều này cho phép cậu chia sẻ kho lưu trữ của mình giữa nhiều bản cài đặt XPipe. Tính năng này hỗ trợ các URL HTTP và SSH, cùng với các thư mục cục bộ.
vault=Kho
workspaceLockDescription=Thiết lập mật khẩu tùy chỉnh để mã hóa mọi thông tin nhạy cảm được lưu trữ trong XPipe.\n\nĐiều này giúp tăng cường bảo mật vì nó cung cấp thêm một lớp mã hóa cho thông tin nhạy cảm của cậu. Sau đó, cậu sẽ được yêu cầu nhập mật khẩu khi XPipe khởi động.
useSystemFontDescription=Điều khiển việc sử dụng phông chữ mặc định của hệ thống hay phông chữ Inter, được tích hợp sẵn trong XPipe.
tooltipDelay=Độ trễ của chú thích
tooltipDelayDescription=Thời gian chờ tính bằng mili giây trước khi hiển thị chú thích công cụ.
fontSize=Kích thước phông chữ
windowOptions=Tùy chọn cửa sổ
saveWindowLocation=Vị trí cửa sổ lưu
saveWindowLocationDescription=Điều khiển xem tọa độ cửa sổ có nên được lưu lại và khôi phục khi khởi động lại hay không.
startupShutdown=Khởi động / Tắt máy
showChildrenConnectionsInParentCategory=Hiển thị các danh mục con trong danh mục cha
showChildrenConnectionsInParentCategoryDescription=Có nên hiển thị tất cả các kết nối nằm trong các danh mục con khi chọn một danh mục cha cụ thể hay không.\n\nNếu tùy chọn này bị tắt, các danh mục sẽ hoạt động giống như các thư mục truyền thống, chỉ hiển thị nội dung trực tiếp của chúng mà không bao gồm các thư mục con.
condenseConnectionDisplay=Hiển thị kết nối cô đọng
condenseConnectionDisplayDescription=Hãy làm sao cho mỗi kết nối cấp cao nhất chiếm ít không gian dọc hơn để danh sách kết nối được gọn gàng hơn.
openConnectionSearchWindowOnConnectionCreation=Mở cửa sổ tìm kiếm kết nối khi tạo kết nối
openConnectionSearchWindowOnConnectionCreationDescription=Có tự động mở cửa sổ tìm kiếm các kết nối phụ khả dụng khi thêm một kết nối shell mới hay không.
workflow=Quy trình làm việc
system=Hệ thống
application=Ứng dụng
storage=Lưu trữ
runOnStartup=Chạy khi khởi động
closeBehaviour=Hành vi khi thoát
closeBehaviourDescription=Điều khiển cách XPipe sẽ xử lý khi đóng cửa sổ chính.
language=Ngôn ngữ
languageDescription=Ngôn ngữ hiển thị sẽ được sử dụng. Các bản dịch được cải thiện nhờ sự đóng góp của cộng đồng. Cậu có thể góp phần vào công việc dịch thuật bằng cách gửi các bản sửa lỗi dịch thuật lên GitHub.
lightTheme=Chủ đề sáng
darkTheme=Chủ đề tối
exit=Thoát khỏi XPipe
continueInBackground=Tiếp tục chạy ngầm
minimizeToTray=Thu nhỏ xuống khay hệ thống
closeBehaviourAlertTitle=Cài đặt hành vi đóng
closeBehaviourAlertTitleHeader=Chọn hành động sẽ thực hiện khi đóng cửa sổ. Mọi kết nối đang hoạt động sẽ bị ngắt khi ứng dụng được tắt.
startupBehaviour=Hành vi khởi động
startupBehaviourDescription=Điều khiển hành vi mặc định của ứng dụng máy tính để bàn khi XPipe được khởi động.
clearCachesAlertTitle=Xóa bộ nhớ đệm
clearCachesAlertContent=Cậu có muốn xóa toàn bộ bộ nhớ đệm của XPipe không? Thao tác này sẽ xóa toàn bộ dữ liệu bộ nhớ đệm được lưu trữ nhằm cải thiện trải nghiệm người dùng.
startGui=Khởi động GUI
startInTray=Khởi động từ khay hệ thống
startInBackground=Khởi động ở chế độ nền
clearCaches=Xóa bộ nhớ đệm ...
clearCachesDescription=Xóa toàn bộ dữ liệu bộ nhớ đệm
cancel=Hủy
notAnAbsolutePath=Không phải là đường dẫn tuyệt đối
notADirectory=Không phải là thư mục
notAnEmptyDirectory=Không phải là thư mục trống
automaticallyCheckForUpdates=Kiểm tra cập nhật
automaticallyCheckForUpdatesDescription=Khi bật tính năng này, thông tin bản phát hành mới sẽ tự động được tải về sau một thời gian khi XPipe đang chạy. Cậu vẫn phải xác nhận rõ ràng việc cài đặt bất kỳ bản cập nhật nào.
sendAnonymousErrorReports=Gửi báo cáo lỗi ẩn danh
sendUsageStatistics=Gửi số liệu thống kê sử dụng ẩn danh
storageDirectory=Thư mục lưu trữ
storageDirectoryDescription=Vị trí mà XPipe sẽ lưu trữ tất cả thông tin kết nối. Khi thay đổi điều này, dữ liệu trong thư mục cũ sẽ không được sao chép sang thư mục mới.
logLevel=Mức độ ghi nhật ký
appBehaviour=Cách ứng dụng hoạt động
logLevelDescription=Mức độ ghi nhật ký nên được sử dụng khi tạo tệp nhật ký.
developerMode=Chế độ nhà phát triển
developerModeDescription=Khi bật tính năng này, cậu sẽ có quyền truy cập vào nhiều tùy chọn bổ sung hữu ích cho việc phát triển.
editor=Trình soạn thảo
custom=Tùy chỉnh
passwordManager=Trình quản lý mật khẩu
externalPasswordManager=Trình quản lý mật khẩu bên ngoài
passwordManagerDescription=Trình quản lý mật khẩu được cài đặt cục bộ để tích hợp.\n\nNếu cậu đã cài đặt trình quản lý mật khẩu, cậu có thể cấu hình XPipe để lấy thông tin mật từ đó, nhờ vậy XPipe sẽ không phải tự quản lý các thông tin mật này.
passwordManagerTest=Quản lý mật khẩu thử nghiệm
passwordManagerTestDescription=Kiểm tra xem tính năng tích hợp trình quản lý mật khẩu có hoạt động đúng không nhé. Nhớ dùng đúng định dạng mã định danh để tham chiếu đến một mục trong trình quản lý mật khẩu nhé.
preferTerminalTabs=Thích mở tab mới
preferTerminalTabsDescription=Tùy chọn này quyết định liệu XPipe có cố gắng mở các tab mới trong trình terminal mà cậu chọn thay vì mở cửa sổ mới hay không. Không phải trình terminal nào cũng hỗ trợ tab.
customRdpClientCommand=Lệnh tùy chỉnh
customRdpClientCommandDescription=Lệnh cần thực thi để khởi động trình khách RDP tùy chỉnh.\n\nChuỗi giữ chỗ $FILE sẽ được thay thế bằng tên tệp .rdp tuyệt đối được đặt trong dấu ngoặc kép khi được gọi. Nhớ đặt đường dẫn đến tệp thực thi trong dấu ngoặc kép nếu nó có chứa khoảng trắng nhé.
customEditorCommand=Lệnh chỉnh sửa tùy chỉnh
customEditorCommandDescription=Lệnh cần thực thi để khởi động trình soạn thảo tùy chỉnh.\n\nChuỗi giữ chỗ $FILE sẽ được thay thế bằng tên tệp tuyệt đối được đặt trong dấu ngoặc kép khi được gọi. Nhớ đặt đường dẫn đến tệp thực thi của trình soạn thảo vào trong dấu ngoặc kép nếu đường dẫn đó có chứa khoảng trắng nhé.
editorReloadTimeout=Thời gian chờ tải lại trình soạn thảo
editorReloadTimeoutDescription=Thời gian chờ tính bằng mili giây trước khi đọc tệp sau khi tệp được cập nhật. Điều này giúp tránh các vấn đề trong trường hợp trình soạn thảo của cậu chậm trong việc ghi hoặc giải phóng khóa tệp.
encryptAllVaultData=Mã hóa toàn bộ dữ liệu trong kho
encryptAllVaultDataDescription=Khi bật tùy chọn này, mọi phần của dữ liệu kết nối kho sẽ được mã hóa bằng khóa mã hóa kho người dùng của cậu, thay vì chỉ mã hóa các thông tin bí mật bên trong dữ liệu đó. Điều này thêm một lớp bảo mật nữa cho các thông số khác như tên người dùng, tên máy chủ, v.v., vốn không được mã hóa mặc định trong kho.\n\nTùy chọn này sẽ khiến lịch sử và bản so sánh git vault của cậu trở nên vô dụng vì cậu sẽ không thể xem được những thay đổi ban đầu nữa, mà chỉ thấy những thay đổi ở dạng nhị phân thôi.
vaultSecurity=Bảo mật kho
developerDisableUpdateVersionCheck=Tắt tính năng kiểm tra phiên bản cập nhật
developerDisableUpdateVersionCheckDescription=Điều này quyết định xem trình kiểm tra cập nhật có bỏ qua số phiên bản khi tìm kiếm bản cập nhật hay không.
developerDisableGuiRestrictions=Tắt các hạn chế của giao diện người dùng
developerDisableGuiRestrictionsDescription=Quyết định xem một số thao tác bị vô hiệu hóa có thể vẫn được thực hiện từ giao diện người dùng hay không.
developerShowHiddenEntries=Hiển thị các mục ẩn
developerShowHiddenEntriesDescription=Khi bật tính năng này, các nguồn dữ liệu ẩn và nội bộ sẽ được hiển thị.
developerShowHiddenProviders=Hiển thị các nhà cung cấp ẩn
developerShowHiddenProvidersDescription=Điều khiển việc hiển thị các nhà cung cấp kết nối và nguồn dữ liệu ẩn và nội bộ trong hộp thoại tạo.
developerDisableConnectorInstallationVersionCheck=Tắt tính năng kiểm tra phiên bản trình kết nối
developerDisableConnectorInstallationVersionCheckDescription=Điều khiển xem trình kiểm tra cập nhật có bỏ qua số phiên bản hay không khi kiểm tra phiên bản của trình kết nối XPipe được cài đặt trên máy từ xa.
shellCommandTest=Kiểm tra lệnh Shell
shellCommandTestDescription=Chạy một lệnh trong phiên shell được XPipe sử dụng nội bộ.
terminal=Thiết bị đầu cuối
terminalType=Trình giả lập thiết bị đầu cuối
terminalConfiguration=Cấu hình thiết bị đầu cuối
terminalCustomization=Tùy chỉnh thiết bị đầu cuối
editorConfiguration=Cấu hình trình soạn thảo
defaultApplication=Ứng dụng mặc định
initialSetup=Cài đặt ban đầu
terminalTypeDescription=Terminal mặc định được dùng để mở kết nối shell.\n\nMức độ hỗ trợ tính năng khác nhau tùy theo từng terminal, và mỗi loại đều được đánh dấu là được khuyến nghị hoặc không được khuyến nghị. Trải nghiệm của cậu sẽ tốt nhất khi dùng một terminal được khuyến nghị.
program=Chương trình
customTerminalCommand=Lệnh terminal tùy chỉnh
customTerminalCommandDescription=Lệnh cần thực thi để mở terminal tùy chỉnh với một lệnh cụ thể.\n\nXPipe sẽ tạo một tập lệnh shell khởi chạy tạm thời để terminal của cậu thực thi. Chuỗi giữ chỗ $CMD trong lệnh mà cậu cung cấp sẽ được thay thế bằng tập lệnh khởi chạy thực tế khi được gọi. Nhớ đặt dấu ngoặc kép cho đường dẫn tệp thực thi terminal nếu nó chứa khoảng trắng nhé.
clearTerminalOnInit=Xóa màn hình khi khởi động
clearTerminalOnInitDescription=Khi được bật, XPipe sẽ chạy lệnh xóa sau khi một phiên terminal mới được khởi chạy để loại bỏ bất kỳ kết quả đầu ra không cần thiết nào được in ra trong quá trình khởi động phiên terminal.
dontCachePasswords=Đừng lưu mật khẩu được yêu cầu vào bộ nhớ đệm
dontCachePasswordsDescription=Tùy chọn này quyết định liệu XPipe có lưu trữ mật khẩu đã nhập vào bộ nhớ đệm nội bộ hay không, để cậu không phải nhập lại chúng trong phiên làm việc hiện tại.\n\nNếu tính năng này bị tắt, cậu sẽ phải nhập lại thông tin đăng nhập mỗi khi hệ thống yêu cầu.
denyTempScriptCreation=Từ chối tạo tập lệnh tạm thời
denyTempScriptCreationDescription=Để thực hiện một số chức năng của mình, XPipe đôi khi tạo các tập lệnh shell tạm thời trên hệ thống đích nhằm giúp thực thi các lệnh đơn giản một cách dễ dàng. Những tập lệnh này không chứa bất kỳ thông tin nhạy cảm nào và chỉ được tạo ra cho mục đích triển khai.\n\nNếu tắt tính năng này, XPipe sẽ không tạo bất kỳ tệp tạm thời nào trên hệ thống từ xa. Tùy chọn này rất hữu ích trong các môi trường bảo mật cao, nơi mọi thay đổi trên hệ thống tệp đều bị giám sát. Nếu tắt tính năng này, một số chức năng, ví dụ như môi trường shell và tập lệnh, sẽ không hoạt động như mong muốn.
disableCertutilUse=Tắt tính năng certutil trên Windows
useLocalFallbackShell=Sử dụng vỏ lệnh dự phòng cục bộ
useLocalFallbackShellDescription=Chuyển sang dùng một shell cục bộ khác để xử lý các thao tác tại chỗ. Trên Windows thì đó là PowerShell, còn trên các hệ thống khác thì là Bourne shell.\n\nTùy chọn này có thể dùng trong trường hợp shell mặc định cục bộ thông thường bị tắt hoặc gặp trục trặc ở mức độ nào đó. Tuy nhiên, một số tính năng có thể không hoạt động như mong đợi khi tùy chọn này được bật.
disableCertutilUseDescription=Do một số hạn chế và lỗi trong cmd.exe, các tập lệnh shell tạm thời được tạo ra bằng certutil thông qua việc sử dụng nó để giải mã đầu vào base64, vì cmd.exe sẽ gặp sự cố khi gặp đầu vào không phải ASCII. XPipe cũng có thể dùng PowerShell cho việc này nhưng sẽ chậm hơn.\n\nTính năng này sẽ vô hiệu hóa mọi việc sử dụng certutil trên hệ thống Windows để thực hiện một số chức năng và chuyển sang dùng PowerShell thay thế. Điều này có thể làm hài lòng một số phần mềm diệt virus vì một số trong số chúng chặn việc sử dụng certutil.
disableTerminalRemotePasswordPreparation=Tắt tính năng chuẩn bị mật khẩu từ xa cho thiết bị đầu cuối
disableTerminalRemotePasswordPreparationDescription=Trong những trường hợp cần thiết lập kết nối shell từ xa qua nhiều hệ thống trung gian trên terminal, có thể sẽ phải chuẩn bị sẵn mật khẩu cần thiết trên một trong các hệ thống trung gian đó để tự động điền vào các lời nhắc.\n\nNếu cậu không muốn mật khẩu bị chuyển sang bất kỳ hệ thống trung gian nào, cậu có thể tắt tính năng này. Khi đó, bất kỳ mật khẩu trung gian nào cần thiết sẽ được yêu cầu nhập trực tiếp trên chính terminal khi mở ứng dụng.
