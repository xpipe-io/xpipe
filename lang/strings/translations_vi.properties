terminalEnvironment=Môi trường terminal
terminalEnvironmentDescription=Nếu cậu muốn tận dụng các tính năng của môi trường WSL dựa trên Linux cục bộ để tùy chỉnh terminal, cậu có thể sử dụng chúng làm môi trường terminal.\n\nTất cả các lệnh khởi động terminal tùy chỉnh và cấu hình bộ ghép kênh terminal sau đó sẽ được chạy trong bản phân phối WSL này.
terminalInitScript=Tập lệnh khởi động terminal
terminalInitScriptDescription=Các lệnh cần chạy trong môi trường terminal trước khi kết nối được thiết lập. Cậu có thể dùng cái này để cấu hình môi trường terminal ngay khi khởi động.
terminalMultiplexer=Bộ ghép kênh đầu cuối
terminalMultiplexerDescription=Bộ ghép kênh đầu cuối dùng thay thế cho các tab trong terminal. Tính năng này sẽ thay thế một số đặc tính xử lý của terminal, ví dụ như xử lý tab, bằng chức năng của bộ ghép kênh.\n\nYêu cầu phải cài đặt tệp thực thi của bộ ghép kênh tương ứng trên hệ thống.
terminalMultiplexerWindowsDescription=Bộ ghép kênh đầu cuối dùng thay thế cho các tab trong terminal. Tính năng này sẽ thay thế một số đặc tính xử lý của terminal, ví dụ như xử lý tab, bằng chức năng của bộ ghép kênh.\n\nYêu cầu phải sử dụng môi trường terminal WSL trên Windows và cài đặt tệp thực thi bộ ghép kênh vào hệ thống WSL.
terminalAlwaysPauseOnExit=Luôn tạm dừng khi thoát
terminalAlwaysPauseOnExitDescription=Khi bật tính năng này, mỗi khi thoát khỏi phiên terminal, cậu sẽ luôn được hỏi xem muốn khởi động lại hay đóng phiên. Nếu tắt tính năng này, XPipe sẽ chỉ làm vậy đối với các kết nối thất bại và bị lỗi.
