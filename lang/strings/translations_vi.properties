limitedTouchscreenMode=Chế độ màn hình cảm ứng giới hạn
limitedTouchscreenModeDescription=Khi dùng ứng dụng này trên những giao diện màn hình cảm ứng đặc biệt hơn như màn hình điện thoại, một số menu có thể không hoạt động đúng. Khi bật tùy chọn này, cách thực hiện menu sẽ sử dụng các chức năng hạn chế hơn để xử lý các sự kiện chuột/cảm ứng được gửi thưa thớt.
