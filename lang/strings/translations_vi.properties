extensionInstallDescription=Hành động này cần thêm các thư viện của bên thứ ba mà XPipe không phân phối. Cậu có thể cài đặt chúng tự động tại đây. Các thành phần sau đó sẽ được tải xuống từ trang web của nhà cung cấp:
extensionInstallLicenseNote=Khi thực hiện tải xuống và cài đặt tự động, cậu đồng ý với các điều khoản của giấy phép bên thứ ba:
