categoryDontAllowScripts=Tắt tất cả các thay đổi
categoryDontAllowScriptsDescription=Hãy tắt mọi lệnh thực thi và các thao tác khác trên các hệ thống thuộc danh mục này để ngăn chặn mọi thay đổi. Việc này sẽ vô hiệu hóa toàn bộ chức năng kịch bản, các lệnh môi trường shell, lời nhắc và nhiều tính năng khác.
