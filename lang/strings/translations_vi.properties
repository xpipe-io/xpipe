focusWindowOnNotificationsDescription=Hãy đưa XPipe lên phía trước khi có thông báo hoặc lỗi xuất hiện, ví dụ như khi kết nối hoặc đường hầm bị ngắt đột ngột.
gitUsername=Tên người dùng git tùy chỉnh
gitUsernameDescription=Tài khoản người dùng tùy chỉnh để xác thực với kho lưu trữ git từ xa. Theo mặc định, XPipe sẽ sử dụng thông tin đăng nhập hiện đang được cấu hình cho CLI git.\n\nCài đặt này sẽ ghi đè lên bất kỳ thông tin đăng nhập mặc định nào đã được cấu hình sẵn cho máy khách CLI git cục bộ của cậu.
