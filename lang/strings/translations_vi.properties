categoryDefaultIdentityDescription=Nếu cậu thường xuyên dùng một danh tính nhất định trên nhiều hệ thống thuộc danh mục này, thì việc thiết lập danh tính mặc định sẽ giúp cậu chọn sẵn danh tính đó khi tạo kết nối mới.
