customEditorCommandInTerminalDescription=Nếu trình soạn thảo của cậu chạy trên nền tảng terminal, cậu có thể bật tùy chọn này để tự động mở terminal và chạy lệnh trong phiên terminal thay thế.\n\nCậu có thể dùng tùy chọn này cho các trình soạn thảo như vi, vim, nvim và những trình khác.
