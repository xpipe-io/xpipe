categorySync=Đồng bộ với kho lưu trữ Git
categorySyncDescription=Tự động đồng bộ tất cả các kết nối với kho lưu trữ Git. Mọi thay đổi cục bộ đối với các kết nối sẽ được đẩy lên máy chủ từ xa.
