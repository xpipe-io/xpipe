categoryConfirmAllModificationsDescription=Hãy xác nhận bất kỳ thay đổi nào đối với kết nối hoặc hệ thống tệp trước tiên. Điều này có thể ngăn chặn các thao tác vô tình trên các hệ thống quan trọng.
