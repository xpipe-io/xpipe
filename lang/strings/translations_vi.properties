rdpClient=Ứng dụng khách RDP
rdpClientDescription=Chương trình khách RDP cần gọi khi thiết lập kết nối RDP.\n\nLưu ý rằng các trình khách khác nhau có mức độ khả năng và tích hợp khác nhau. Một số trình khách không hỗ trợ tự động điền mật khẩu, nên cậu vẫn phải nhập mật khẩu khi khởi chạy.
localShell=Vỏ lệnh cục bộ
themeDescription=Chủ đề hiển thị mà cậu thích.
dontAutomaticallyStartVmSshServer=Đừng tự động khởi động máy chủ SSH cho các máy ảo khi cần thiết
dontAutomaticallyStartVmSshServerDescription=Mọi kết nối shell đến một máy ảo (VM) đang chạy trên hypervisor đều được thực hiện qua SSH. XPipe có thể tự động khởi động máy chủ SSH đã cài đặt khi cần thiết. Nếu cậu không muốn điều này vì lý do bảo mật, thì chỉ cần tắt tính năng này bằng tùy chọn này là được.
confirmGitShareTitle=Đồng bộ hóa Git
confirmGitShareContent=Cậu có muốn thêm tệp đã chọn vào kho lưu trữ git vault của mình không? Thao tác này sẽ sao chép một phiên bản được mã hóa của tệp vào git vault và ghi lại các thay đổi của cậu. Sau đó, cậu sẽ có quyền truy cập tệp này trên tất cả các máy tính để bàn đã đồng bộ hóa.
gitShareFileTooltip=Thêm tệp vào thư mục dữ liệu git vault để nó được đồng bộ hóa tự động.\n\nHành động này chỉ có thể được sử dụng khi git vault đã được bật trong cài đặt.
performanceMode=Chế độ hiệu suất
performanceModeDescription=Tắt tất cả các hiệu ứng hình ảnh không cần thiết để cải thiện hiệu suất ứng dụng.
dontAcceptNewHostKeys=Đừng tự động chấp nhận các khóa máy chủ SSH mới
dontAcceptNewHostKeysDescription=XPipe sẽ tự động chấp nhận khóa máy chủ theo mặc định từ các hệ thống mà client SSH của cậu chưa lưu sẵn khóa máy chủ nào. Tuy nhiên, nếu bất kỳ khóa máy chủ nào đã biết bị thay đổi, nó sẽ từ chối kết nối trừ khi cậu chấp nhận khóa mới.\n\nViệc tắt tính năng này cho phép cậu kiểm tra tất cả các khóa máy chủ, ngay cả khi ban đầu không có xung đột nào.
uiScale=Tỷ lệ giao diện người dùng
uiScaleDescription=Một giá trị tỷ lệ tùy chỉnh mà cậu có thể thiết lập độc lập với tỷ lệ hiển thị chung của hệ thống. Các giá trị được tính theo phần trăm, ví dụ như giá trị 150 sẽ dẫn đến tỷ lệ giao diện người dùng là 150%.
editorProgram=Chương trình soạn thảo
editorProgramDescription=Trình soạn thảo văn bản mặc định dùng để chỉnh sửa mọi loại dữ liệu văn bản.
windowOpacity=Độ mờ của cửa sổ
windowOpacityDescription=Thay đổi độ mờ của cửa sổ để theo dõi những gì đang diễn ra ở chế độ nền.
useSystemFont=Dùng phông chữ hệ thống
openDataDir=Thư mục dữ liệu Vault
openDataDirButton=Mở thư mục dữ liệu
openDataDirDescription=Nếu cậu muốn đồng bộ thêm các tệp khác, chẳng hạn như khóa SSH, giữa các hệ thống với kho lưu trữ git của mình, cậu có thể đặt chúng vào thư mục dữ liệu lưu trữ. Bất kỳ tệp nào được tham chiếu ở đó sẽ tự động được điều chỉnh đường dẫn tệp trên bất kỳ hệ thống đồng bộ nào.
