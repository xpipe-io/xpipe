httpServer=Máy chủ HTTP
mcpServer=Máy chủ MCP
apiKey=Khóa API
apiKeyDescription=Khóa API dùng để xác thực các yêu cầu API của daemon XPipe. Để biết thêm thông tin về cách xác thực, hãy xem tài liệu API chung.
disableApiAuthentication=Tắt xác thực API
disableApiAuthenticationDescription=Tắt tất cả các phương thức xác thực bắt buộc để mọi yêu cầu chưa được xác thực đều được xử lý.\n\nChỉ nên tắt tính năng xác thực khi đang phát triển ứng dụng thôi nhé.
api=API
storeIntroImportContent=Cậu đã dùng XPipe trên hệ thống khác rồi à? Hãy đồng bộ các kết nối hiện có của cậu trên nhiều hệ thống thông qua một kho lưu trữ git từ xa nhé. Nếu chưa thiết lập xong, cậu cũng có thể đồng bộ lại sau này bất cứ lúc nào.
storeIntroImportButton=Đồng bộ hóa kết nối ...
storeIntroImportHeader=Nhập kết nối
showNonRunningChildren=Hiển thị các tiến trình con không đang chạy
httpApi=API HTTP
isOnlySupportedLimit=chỉ được hỗ trợ với giấy phép chuyên nghiệp khi có hơn $COUNT$ kết nối
areOnlySupportedLimit=chỉ được hỗ trợ với giấy phép chuyên nghiệp khi có hơn $COUNT$ kết nối
enabled=Đã bật
enableGitStoragePtbDisabled=Tính năng đồng bộ hóa Git đã bị tắt cho các bản dựng thử nghiệm công khai (PTB) nhằm ngăn chặn việc sử dụng chung với các kho lưu trữ Git phát hành chính thức và để khuyến khích mọi người không dùng bản dựng PTB làm công cụ làm việc hàng ngày.
copyId=Sao chép ID API
requireDoubleClickForConnections=Yêu cầu nhấp đúp để kết nối
requireDoubleClickForConnectionsDescription=Nếu tính năng này được bật, cậu sẽ phải nhấp đúp vào các kết nối để khởi chạy chúng. Điều này rất hữu ích nếu cậu đã quen với việc nhấp đúp vào các mục.
clearTransferDescription=Hủy chọn
selectTab=Chọn tab
closeTab=Đóng tab
closeOtherTabs=Đóng các tab khác
closeAllTabs=Đóng tất cả các tab
closeLeftTabs=Đóng các tab ở bên trái
closeRightTabs=Đóng các tab ở bên phải
addSerial=Nối tiếp ...
connect=Kết nối
quickConnect=Kết nối nhanh
workspaces=Không gian làm việc
manageWorkspaces=Quản lý không gian làm việc
addWorkspace=Thêm không gian làm việc ...
addWorkspaceDescription=Mở hộp thoại tạo không gian làm việc mới
workspaceManagement=Quản lý không gian làm việc
workspaceManagementDescription=Các không gian làm việc là những cấu hình riêng biệt để chạy XPipe. Mỗi không gian làm việc đều có một thư mục dữ liệu, nơi tất cả dữ liệu được lưu trữ cục bộ. Điều này bao gồm dữ liệu kết nối, cài đặt và nhiều thứ khác.\n\nNếu cậu sử dụng tính năng đồng bộ hóa, cậu cũng có thể chọn đồng bộ hóa từng không gian làm việc với một kho lưu trữ git khác nhau.
workspaceName=Tên không gian làm việc
workspaceNameDescription=Tên hiển thị của không gian làm việc
workspacePath=Đường dẫn đến không gian làm việc
workspacePathDescription=Vị trí của thư mục dữ liệu không gian làm việc
workspaceCreationAlertTitle=Tạo không gian làm việc
developerForceSshTty=Buộc sử dụng SSH TTY
developerForceSshTtyDescription=Hãy để tất cả các kết nối SSH đều phân bổ một pty để kiểm tra xem hệ thống có hỗ trợ stderr và pty hay không.
developerDisableSshTunnelGateways=Tắt tính năng tạo đường hầm cổng SSH
developerDisableSshTunnelGatewaysDescription=Đừng dùng phiên kết nối đường hầm cho các cổng mà hãy kết nối trực tiếp với hệ thống nhé.
ttyWarning=Kết nối này đã ép buộc phân bổ một pty/tty và không cung cấp luồng stderr riêng biệt.\n\nĐiều này có thể dẫn đến một số vấn đề.\n\nNếu có thể, cậu hãy xem xét cách để lệnh kết nối không phân bổ pty.
xshellSetup=Cài đặt Xshell
termiusSetup=Cài đặt Termius
tryPtbDescription=Hãy thử nghiệm các tính năng mới ngay từ các bản dựng dành cho nhà phát triển của XPipe
confirmVaultUnencryptTitle=Xác nhận giải mã kho
confirmVaultUnencryptContent=Cậu có thực sự muốn tắt tính năng mã hóa nâng cao cho kho dữ liệu không? Thao tác này sẽ loại bỏ lớp mã hóa bổ sung cho dữ liệu được lưu trữ và sẽ ghi đè lên dữ liệu hiện có.
enableHttpApi=Bật API HTTP
enableHttpApiDescription=Kích hoạt API, cho phép các chương trình bên ngoài gọi daemon XPipe để thực hiện các thao tác với các kết nối được quản lý của cậu.
chooseCustomIcon=Chọn biểu tượng tùy chỉnh
gitVault=Git vault
fileBrowser=Trình duyệt tệp
confirmAllDeletions=Xác nhận tất cả các thao tác xóa
confirmAllDeletionsDescription=Có hiển thị hộp thoại xác nhận cho tất cả các thao tác xóa hay không. Theo mặc định, chỉ các thư mục mới yêu cầu xác nhận.
yesterday=Hôm qua
green=Màu xanh lá
yellow=Màu vàng
blue=Màu xanh
red=Màu đỏ
cyan=Màu lục lam
purple=Màu tím
asktextAlertTitle=Lời nhắc
fileWriteSudoTitle=Ghi tệp bằng Sudo
fileWriteSudoContent=Tệp mà cậu đang cố ghi không cấp quyền ghi cho người dùng của cậu. Cậu có muốn ghi tệp này với tư cách root bằng sudo không? Thao tác này sẽ tự động nâng quyền lên root bằng thông tin đăng nhập hiện có hoặc qua lời nhắc.
dontAllowTerminalRestart=Không cho phép khởi động lại thiết bị đầu cuối
dontAllowTerminalRestartDescription=Theo mặc định, các phiên terminal có thể được khởi động lại sau khi kết thúc ngay từ bên trong terminal. Để cho phép điều này, XPipe sẽ chấp nhận các yêu cầu bên ngoài từ terminal để khởi động lại phiên\n\nXPipe không kiểm soát được terminal cũng như nguồn gốc của lệnh gọi này, nên các ứng dụng cục bộ độc hại cũng có thể lợi dụng tính năng này để thiết lập kết nối qua XPipe. Việc tắt tính năng này sẽ ngăn chặn tình huống này xảy ra.
openDocumentation=Mở tài liệu
openDocumentationDescription=Hãy ghé trang tài liệu XPipe để xem thông tin về vấn đề này
renameAll=Đổi tên tất cả
logging=Ghi nhật ký
enableTerminalLogging=Bật tính năng ghi nhật ký thiết bị đầu cuối
enableTerminalLoggingDescription=Kích hoạt tính năng ghi nhật ký phía máy khách cho tất cả các phiên làm việc trên terminal. Tất cả dữ liệu đầu vào và đầu ra của phiên làm việc trên terminal đều được ghi vào tệp nhật ký phiên. Lưu ý rằng bất kỳ thông tin nhạy cảm nào như lời nhắc nhập mật khẩu sẽ không được ghi lại.
terminalLoggingDirectory=Nhật ký phiên làm việc trên thiết bị đầu cuối
terminalLoggingDirectoryDescription=Tất cả các bản ghi đều được lưu trữ trong thư mục dữ liệu XPipe trên hệ thống cục bộ của cậu.
openSessionLogs=Mở nhật ký phiên
sessionLogging=Ghi nhật ký thiết bị đầu cuối
sessionActive=Hiện có một phiên nền đang chạy cho kết nối này.\n\nĐể dừng phiên này theo cách thủ công, hãy nhấp vào chỉ báo trạng thái.
skipValidation=Bỏ qua xác thực
scriptsIntroHeader=Giới thiệu về các tập lệnh
scriptsIntroContent=Cậu có thể chạy các tập lệnh khi khởi động shell, trong trình duyệt tệp và theo yêu cầu. Cậu có thể tự tạo các tập lệnh trong XPipe hoặc nhập các tập lệnh có sẵn từ hệ thống cục bộ hoặc từ kho git từ xa.
scriptsIntroBottomHeader=Sử dụng tập lệnh
scriptsIntroBottomContent=Có rất nhiều mẫu kịch bản để cậu bắt đầu. Cậu có thể nhấp vào nút chỉnh sửa của từng kịch bản để xem cách chúng được triển khai. Trước tiên, các kịch bản phải được bật lên thì mới chạy được và hiển thị trong menu, mỗi kịch bản đều có một nút bật/tắt dành cho việc này.
scriptsIntroBottomButton=Bắt đầu
scriptSourcesIntroHeader=Nguồn mã
scriptSourcesIntroContent=Cậu có thể thêm các nguồn kịch bản tùy chỉnh để truy cập ngay lập tức vào toàn bộ bộ sưu tập các kịch bản shell. Cả nguồn cục bộ lẫn kho lưu trữ git từ xa đều được hỗ trợ làm nguồn. Tất cả các kịch bản được phát hiện từ nguồn sẽ tự động có sẵn.
scriptSourcesIntroButton=Thêm nguồn ...
checkForSecurityUpdates=Kiểm tra các bản cập nhật bảo mật
checkForSecurityUpdatesDescription=XPipe có thể kiểm tra các bản cập nhật bảo mật tiềm năng một cách riêng biệt so với các bản cập nhật tính năng thông thường. Khi tính năng này được bật, ít nhất các bản cập nhật bảo mật quan trọng sẽ được đề xuất cài đặt ngay cả khi tính năng kiểm tra cập nhật thông thường bị tắt.\n\nViệc tắt cài đặt này sẽ khiến hệ thống không thực hiện yêu cầu phiên bản bên ngoài nào cả, và cậu sẽ không nhận được thông báo về bất kỳ bản cập nhật bảo mật nào.
clickToDock=Nhấp để gắn thiết bị đầu cuối
terminalStarting=Đang chờ khởi động thiết bị đầu cuối...
pinTab=Tab Ghim
unpinTab=Bỏ ghim tab
pinned=Đã ghim
enableConnectionHubTerminalDocking=Bật tính năng kết nối thiết bị đầu cuối trung tâm
enableConnectionHubTerminalDockingDescription=Cậu có thể ghim các cửa sổ terminal vào cửa sổ ứng dụng XPipe trong trung tâm kết nối để mô phỏng một terminal tích hợp một phần. Sau đó, các cửa sổ terminal sẽ được XPipe quản lý để luôn vừa vặn với thanh ghim.
enableFileBrowserTerminalDocking=Bật tính năng gắn cửa sổ trình duyệt tệp vào thanh công cụ
enableFileBrowserTerminalDockingDescription=Cậu có thể ghim các cửa sổ terminal vào cửa sổ ứng dụng XPipe trong trình duyệt tệp để mô phỏng một terminal tích hợp một phần. Các cửa sổ terminal sau đó sẽ được XPipe quản lý để luôn vừa vặn với thanh ghim.
downloadsDirectory=Thư mục tải xuống tùy chỉnh
downloadsDirectoryDescription=Thư mục tùy chỉnh để lưu các tệp đã tải xuống khi nhấp vào nút "Chuyển đến thư mục Tải xuống". Theo mặc định, XPipe sẽ sử dụng thư mục Tải xuống của người dùng.
pinLocalMachineOnStartup=Ghim tab Máy tính cục bộ khi khởi động
pinLocalMachineOnStartupDescription=Tự động mở tab máy tính cục bộ và ghim nó lại. Tính năng này rất hữu ích nếu cậu thường xuyên sử dụng trình duyệt tệp chia đôi với máy tính cục bộ và hệ thống tệp từ xa đang mở.
terminalErrorDescription=Lỗi này là lỗi nghiêm trọng và XPipe không thể tiếp tục nếu không khắc phục được.
groupName=Tên nhóm
chmodPermissions=Quyền mới
editFilesWithDoubleClick=Chỉnh sửa tệp bằng cách nhấp đúp
editFilesWithDoubleClickDescription=Khi tính năng này được bật, việc nhấp đúp vào tệp sẽ mở trực tiếp tệp đó trong trình soạn thảo văn bản của cậu thay vì hiển thị menu ngữ cảnh.
censorMode=Chế độ kiểm duyệt
censorModeDescription=Làm mờ mọi thông tin như tên máy chủ, tên người dùng, tên kết nối, v.v.\n\nTính năng này rất hữu ích nếu cậu định chụp ảnh màn hình hoặc chia sẻ màn hình XPipe mà không muốn lộ bất kỳ thông tin nào.
addIdentity=Thông tin nhận dạng ...
identities=Thông tin nhận dạng
addMacro=Hành động ...
identitiesIntroHeader=Về danh tính
identitiesIntroContent=Nếu cậu đang tái sử dụng các tổ hợp tên người dùng, mật khẩu và khóa phổ biến, việc tạo các danh tính có thể tái sử dụng sẽ rất hữu ích. Điều này giúp cậu dễ dàng truy cập chúng khi thêm các kết nối mới.
identitiesIntroBottomHeader=Chia sẻ danh tính
identitiesIntroBottomContent=Cậu có thể thêm danh tính tại địa phương hoặc đồng bộ chúng lên kho lưu trữ git khi tính năng này được bật. Điều này cho phép chia sẻ danh tính một cách có chọn lọc trên nhiều hệ thống và với các thành viên khác trong nhóm.
identitiesIntroBottomButton=Cài đặt đồng bộ
identitiesIntroButton=Tạo danh tính
userName=Tên người dùng
userAuth=Xác thực mật khẩu dựa trên người dùng
groupAuth=Xác thực bí mật dựa trên nhóm
team=Nhóm
teamSettings=Cài đặt nhóm
teamVaults=Kho dữ liệu của nhóm
vaultTypeNameDefault=Kho mặc định
vaultTypeNameLegacy=Kho lưu trữ cá nhân cũ
vaultTypeNamePersonal=Kho lưu trữ cá nhân
vaultTypeNameTeam=Kho dữ liệu của nhóm
teamVaultsDescription=Kho dữ liệu nhóm cho phép nhiều người dùng và nhóm truy cập an toàn vào một kho dữ liệu chung. Cậu có thể cấu hình các kết nối và danh tính để chia sẻ cho tất cả người dùng hoặc chỉ cho phép các người dùng và nhóm riêng lẻ truy cập bằng cách mã hóa chúng bằng khóa riêng của họ. Những người dùng kho dữ liệu khác sẽ không thể truy cập các kết nối và danh tính cá nhân cũng như dựa trên nhóm nếu họ không có quyền truy cập vào khóa đó.
vaultTypeContentDefault=Hiện tại cậu đang dùng một kho lưu trữ mặc định mà chưa thiết lập người dùng cũng như mật khẩu tùy chỉnh. Các thông tin bí mật được mã hóa bằng khóa kho lưu trữ cục bộ.\n\nCậu có thể nâng cấp lên kho lưu trữ cá nhân bằng cách tạo tài khoản người dùng cho kho lưu trữ. Điều này cho phép cậu mã hóa các thông tin bí mật trong kho bằng mật khẩu cá nhân của riêng mình, và cậu sẽ phải nhập mật khẩu này mỗi lần đăng nhập để mở khóa kho lưu trữ.
vaultTypeContentLegacy=Hiện tại cậu đang dùng một kho lưu trữ cá nhân kiểu cũ cho tài khoản của mình. Các thông tin bí mật được mã hóa bằng mật khẩu cá nhân của cậu. Tính năng tương thích với phiên bản cũ này có chức năng hạn chế và không thể nâng cấp trực tiếp lên kho lưu trữ nhóm được.
vaultTypeContentPersonal=Hiện tại cậu đang dùng một kho riêng cho tài khoản của mình. Các thông tin bí mật được mã hóa bằng mật khẩu cá nhân của cậu. Cậu có thể nâng cấp lên kho nhóm bằng cách thêm người dùng vào kho hoặc thiết lập quyền truy cập theo nhóm.
vaultTypeContentTeam=Hiện tại cậu đang dùng một kho dữ liệu nhóm, cho phép nhiều người dùng truy cập an toàn vào một kho dữ liệu chung. Cậu có thể thiết lập các kết nối và danh tính để chia sẻ cho tất cả mọi người hoặc chỉ dành riêng cho tài khoản cá nhân hay nhóm của cậu bằng cách mã hóa chúng bằng khóa cá nhân hoặc khóa nhóm. Những người dùng khác trong kho dữ liệu sẽ không thể truy cập các kết nối và danh tính cá nhân hay nhóm của cậu nếu họ không có quyền truy cập vào khóa đó.
groupManagement=Quản lý nhóm
groupManagementEmpty=Quản lý nhóm
groupManagementDescription=Quản lý các nhóm kho hiện có hoặc tạo nhóm mới. Mỗi nhóm kho đều có khóa bí mật riêng, được dùng để mã hóa các kết nối và danh tính chỉ dành riêng cho nhóm đó mà không ai khác có thể truy cập.
groupManagementEmptyDescription=Quản lý các nhóm kho dữ liệu hiện có hoặc tạo nhóm mới. Mỗi nhóm kho dữ liệu đều có khóa bí mật riêng, được dùng để mã hóa các kết nối và danh tính chỉ dành riêng cho nhóm đó mà không ai khác có thể truy cập.\n\nTài khoản theo nhóm dành cho đội ngũ được hỗ trợ trong gói chuyên nghiệp.
userManagement=Quản lý người dùng
userManagementEmpty=Quản lý người dùng
userManagementDescription=Quản lý người dùng kho dữ liệu hiện có hoặc tạo người dùng mới. Mỗi người dùng kho dữ liệu đều có mật khẩu riêng để mã hóa kết nối và danh tính, những thông tin này chỉ dành cho chính người dùng đó chứ không phải ai khác.
userManagementEmptyDescription=Quản lý người dùng kho dữ liệu hiện có hoặc tạo người dùng mới. Mỗi người dùng kho dữ liệu đều có mật khẩu riêng để mã hóa kết nối và danh tính, những thông tin này chỉ dành cho chính người dùng đó chứ không phải ai khác. Hãy tạo một tài khoản cho chính mình để có thể mã hóa kết nối và danh tính bằng khóa cá nhân của cậu.\n\nPhiên bản cộng đồng chỉ hỗ trợ một tài khoản người dùng. Gói chuyên nghiệp hỗ trợ nhiều tài khoản người dùng cho cả nhóm.
userIntroHeader=Quản lý người dùng
