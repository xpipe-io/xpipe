allowExternalApiRequests=Cho phép các yêu cầu API từ bên ngoài
allowExternalApiRequestsDescription=Theo mặc định, máy chủ API chỉ lắng nghe trên localhost. Nếu cậu muốn chấp nhận cả các kết nối từ bên ngoài localhost, cậu có thể bật tùy chọn này.
certificateRenewCommand=Lệnh gia hạn chứng chỉ
certificateRenewCommandDescription=Lệnh tùy chỉnh cần thực thi để gia hạn chứng chỉ nếu nó đã hết hạn
touchNoticeTitle=Xác nhận sự hiện diện của người dùng
touchNoticeContent=Khóa bảo mật của cậu đang yêu cầu cậu xác nhận sự hiện diện của mình, ví dụ như bằng cách chạm vào nó. Từ giờ trở đi, mỗi khi cần thực hiện thao tác này, một biểu tượng dấu vân tay sẽ xuất hiện ở góc dưới bên phải.
rdpUseSystemDisplayScale=Sử dụng tỷ lệ hiển thị của hệ thống
rdpUseSystemDisplayScaleDescription=Áp dụng tỷ lệ hiển thị tương tự cho kết nối từ xa như tỷ lệ hiển thị trên màn hình cục bộ của cậu.
rescan=Quét lại
hostAddressPrompt=Nhập tên máy chủ hoặc địa chỉ IP
connectionHandling=Quản lý kết nối
connectionConfiguration=Cấu hình kết nối
move=Di chuyển
confirmDeletionTitle=Xác nhận xóa
confirmDeletionContent=Cậu có muốn xóa các mục đã chọn không?
creationMinimizeNoticeTitle=Hộp thoại đã thu nhỏ
creationMinimizeNoticeContent=Hộp thoại hiện tại đã được thu nhỏ. Cậu có thể mở lại hộp thoại này bằng cách nhấp vào biểu tượng thu nhỏ ở góc dưới bên phải.
terminalDockDialogTitle=Kết nối thiết bị đầu cuối
terminalDockDialogContent=Cậu có muốn luôn ghim các cửa sổ terminal vào ứng dụng XPipe không? Cậu có thể thay đổi cách hoạt động của cửa sổ terminal trong menu cài đặt.
applicationBehaviour=Cách ứng dụng hoạt động
availableShells=Các giao diện dòng lệnh có sẵn
keepEnabled=Giữ nguyên trạng thái bật
backgroundSessionInactivityTimeout=Thời gian chờ khi vỏ nền không hoạt động
backgroundSessionInactivityTimeoutDescription=Số giây để đóng các phiên shell chạy nền sau khi chúng không được sử dụng.\n\nTheo mặc định, XPipe sẽ giữ các kết nối shell với các hệ thống từ xa mở ở chế độ nền để tái sử dụng sau này và tăng tốc các thao tác. Nếu cậu muốn tự động đóng các kết nối đó đúng lúc, cậu có thể thiết lập tùy chọn này.
certificateDetails=Chi tiết chứng chỉ
certificateDetailsDescription=Kiểm tra xem đây có phải là chứng chỉ đúng không
certificateName=Tên
certificateNameDescription=Đặt tên dễ nhận biết cho chứng chỉ đã lưu
trust=Trust
untrustedCertificateTitle=Chứng chỉ không đáng tin cậy
browseCertificateStoreButton=Duyệt các chứng chỉ tùy chỉnh
browseCertificateStore=Kho chứng chỉ
browseCertificateStoreDescription=Mở thư mục kho chứng chỉ để quản lý các chứng chỉ TLS tùy chỉnh được chấp nhận ở định dạng .pem. Chứng chỉ sẽ được thêm vào tự động khi cần thiết và được người dùng xác nhận, nên cậu không cần phải thêm chứng chỉ thủ công ở đây đâu.
proxyTestAddressDialogTitle=Nhập địa chỉ
proxyTestAddress=Địa chỉ thử nghiệm
proxyTestAddressDescription=Địa chỉ để kết nối qua HTTP thông qua proxy nhằm kiểm tra kết nối
gpgSyncDialogTitle=Đồng bộ hóa với GPG
gpgSyncDialogContent=Cậu đã bật tính năng ký GPG cho git rồi đấy. Điều này sẽ làm chậm các thao tác đồng bộ, nên những thay đổi lớn có thể sẽ mất nhiều thời gian hơn bình thường để đồng bộ.
downloadDialogTitle=Tải xuống xong rồi
downloadDialogContent=Các tệp đã được tải xuống máy tính của cậu rồi. Giờ cậu có thể kéo và thả chúng vào môi trường máy tính để bàn và các ứng dụng gốc của mình từ hộp tải xuống ở góc dưới bên trái.
syncInProgressTitle=Đang đồng bộ
syncInProgressContent=Hiện tại, những thay đổi của cậu đang được lưu và đồng bộ hóa. Cậu sẽ thấy những thay đổi này trên máy từ xa ngay khi quá trình hoàn tất.
syncIdentity=Đồng bộ hóa danh tính
convertToMulti=Chuyển đổi sang đa
sshDisableShellInitTimeout=Hệ thống này mất nhiều thời gian để kết nối
sshDisableShellInitTimeoutDescription=Hãy tắt mọi thời gian chờ kết nối trong trường hợp quá trình xác thực mất nhiều thời gian mới thành công
bitwardenUnlock=Mở khóa kho dữ liệu bằng mật khẩu chính Bitwarden của cậu
enpassUnlock=Nhập mật khẩu chính của kho Enpass
keeperSmsUnlock=Nhập mã SMS của Keeper Commander
keeper2faUnlock=Nhập mã xác thực hai yếu tố (2FA) của Keeper
keeperUnlock=Nhập mật khẩu chính Keeper của cậu để mở khóa
