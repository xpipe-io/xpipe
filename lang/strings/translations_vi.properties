disableSshPinCachingDescription=XPipe sẽ tự động lưu vào bộ nhớ đệm bất kỳ mã PIN nào đã được nhập cho một khóa khi sử dụng hình thức xác thực dựa trên phần cứng.\n\nNếu tắt tính năng này, cậu sẽ phải nhập lại mã PIN mỗi khi cố gắng kết nối.
