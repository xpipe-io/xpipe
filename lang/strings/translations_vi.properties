terminalPrompt=Dấu nhắc của terminal
terminalPromptDescription=Công cụ dòng lệnh dùng cho các thiết bị đầu cuối từ xa của cậu. Khi bật tính năng dòng lệnh, công cụ này sẽ tự động cài đặt và cấu hình trên hệ thống đích ngay khi cậu mở phiên làm việc với thiết bị đầu cuối.\n\nViệc này sẽ không thay đổi bất kỳ cấu hình dòng lệnh hay tệp cấu hình nào hiện có trên hệ thống. Tuy nhiên, thời gian tải thiết bị đầu cuối lần đầu tiên có thể lâu hơn một chút do quá trình thiết lập dòng lệnh trên hệ thống từ xa. Có thể thiết bị đầu cuối của cậu sẽ cần thêm một số phông chữ để hiển thị dòng lệnh đúng cách.
terminalPromptConfiguration=Cấu hình dấu nhắc lệnh
terminalPromptConfig=Tệp cấu hình
terminalPromptConfigDescription=Tệp cấu hình tùy chỉnh để áp dụng cho dòng lệnh. Cấu hình này sẽ được thiết lập tự động trên hệ thống đích khi terminal được khởi động và được dùng làm cấu hình dòng lệnh mặc định.\n\nNếu cậu muốn dùng tệp cấu hình mặc định có sẵn trên từng hệ thống, cậu có thể để trống trường này.
