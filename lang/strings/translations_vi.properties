hardwareSecurityKey=Khóa bảo mật phần cứng (PKCS#11)
macOsKeychain=bộ khóa macOS
customLibrary=Thư viện tùy chỉnh
unsyncedIdentityTitle=Nhận dạng không đồng bộ
unsyncedIdentityContent=Kết nối này được đánh dấu để đồng bộ hóa trên nhiều hệ thống, nhưng danh tính mà cậu đã chọn chỉ có hiệu lực cục bộ. Điều này sẽ dẫn đến việc thiếu danh tính trên các hệ thống khác.\n\nCậu có thể chuyển đổi danh tính cục bộ này thành danh tính đồng bộ, hoặc chuyển đổi nó thành danh tính đa năng để chuyển đổi giữa nhiều danh tính cục bộ trên mỗi hệ thống được đồng bộ.
