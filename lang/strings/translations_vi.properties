httpProxy=Proxy HTTP
httpProxyDescription=Proxy sẽ được sử dụng cho mọi loại yêu cầu HTTP được gửi bởi XPipe và các công cụ bên ngoài khác.\n\nNếu proxy giải mã lưu lượng TLS, cậu sẽ được nhắc thêm bất kỳ chứng chỉ tùy chỉnh nào vào kho chứng chỉ nội bộ của XPipe ngay khi kết nối được thiết lập. Cậu có thể dùng nút kiểm tra để xác minh kết nối.
