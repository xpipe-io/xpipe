passwordManagerCommandDescription=Lệnh tùy chỉnh cần thực thi để lấy mật khẩu. Chuỗi giữ chỗ $KEY sẽ được thay thế bằng khóa mật khẩu được đặt trong dấu ngoặc kép khi lệnh được gọi. Lệnh này sẽ gọi CLI của trình quản lý mật khẩu của cậu để in mật khẩu thô hoặc thông tin đăng nhập dưới dạng json ra stdout, ví dụ: mypassmgr get $KEY.
