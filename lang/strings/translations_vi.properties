clipboardNoticeTitle=Mật khẩu đã được sao chép
clipboardNoticeContent=Vì ứng dụng mục tiêu không hỗ trợ việc truyền mật khẩu trực tiếp, nên mật khẩu của cậu đã được sao chép vào khay nhớ tạm để cậu dán vào. Trong tương lai, việc này sẽ được thực hiện tự động. Cậu có thể thấy biểu tượng khay nhớ tạm ở góc dưới bên phải màn hình.
sftpNoticeTitle=Chuyển file dung lượng lớn
sftpNoticeContent=Các tệp cậu đang cố chuyển có dung lượng khá lớn. Phiên hiện tại đang sử dụng SSH thô, nên tốc độ truyền tải không được tối ưu. Nếu cần tăng tốc độ truyền tải, cậu có thể xem xét mở một phiên SFTP đến hệ thống qua menu chuột phải trong trình duyệt tệp.
hideVaultEntryNames=Ẩn tên các mục trong kho
hideVaultEntryNamesDescription=Xóa tất cả tên kết nối và các thông tin khác khỏi các tệp README và thông điệp cam kết. Tùy chọn này giúp ngăn chặn việc ai đó có thể nhìn thấu cấu trúc của nội dung trong kho dữ liệu được mã hóa.
disableHardwareAcceleration=Tắt tính năng tăng tốc phần cứng
disableHardwareAccelerationDescription=Tính năng này sẽ vô hiệu hóa việc sử dụng card đồ họa để hiển thị và chỉ sử dụng quy trình hiển thị bằng phần mềm.\n\nĐiều này sẽ làm giảm hiệu suất đáng kể, nhưng có thể là cách duy nhất để hiển thị nếu gặp vấn đề với trình điều khiển card đồ họa.
disableRdpWindowsSecurityWarning=Tắt cảnh báo bảo mật RDP
disableRdpWindowsSecurityWarningDescription=Đừng hiển thị cảnh báo mới của Windows về các tệp .rdp không được ký mỗi khi khởi chạy một phiên mới.\n\nThao tác này sẽ thay đổi khóa đăng ký để đưa máy khách RDP của Windows trở lại cách hoạt động cũ. Hành động này sẽ hiển thị cửa sổ bật lên yêu cầu quyền quản trị viên.
rdpWindowsSecurityWarningDialogTitle=Cảnh báo bảo mật RDP
rdpWindowsSecurityWarningDialogContent=Kể từ bản Windows 26200, Windows sẽ luôn hiển thị cảnh báo khi một tệp RDP không được ký được khởi chạy, bất kể nội dung của tệp đó là gì.\n\nCậu có thể tắt cảnh báo này trong menu cài đặt.
openSettings=Mở cài đặt
openSettingsDescription=Chuyển đến mục cài đặt tương ứng
toggleSizeLock=Chuyển đổi khóa kích thước
useExternalNetcatForProxies=Sử dụng tệp thực thi netcat cài đặt bên ngoài cho các proxy
useExternalNetcatForProxiesDescription=Nếu có thể, hãy dùng bản netcat cài sẵn trên máy để làm proxy cho các kết nối SSH thay vì dùng tính năng proxy có sẵn. Để làm được điều này, cậu cần cài đặt ncat trên Windows và nc trên các hệ điều hành khác.
